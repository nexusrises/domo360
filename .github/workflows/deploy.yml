# Workflow para compilar y desplegar el proyecto a GitHub Pages de manera automática
name: Deploy static content to Pages

on:
  # Se ejecuta al hacer push a la rama main
  push:
    branches: ["main"]

  # Permite ejecutar el workflow manualmente desde la pestaña Actions en GitHub
  workflow_dispatch:

# Configura los permisos del GITHUB_TOKEN para permitir despliegues en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permite un solo despliegue concurrente a la vez
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
